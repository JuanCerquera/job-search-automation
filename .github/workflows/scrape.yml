name: LinkedIn Job Scraper

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SHEET_ID: ${{ vars.SHEET_ID }}
      CREDS_FILE: service_account.json
      KEYWORDS: ${{ vars.KEYWORDS }}
      USAJOBS_API_KEY: ${{ vars.USAJOBS_API_KEY }}
      USAJOBS_USER_AGENT_EMAIL: ${{ vars.USAJOBS_USER_AGENT_EMAIL }}
      USAJOBS_RESULTS_PER_PAGE: ${{ vars.USAJOBS_RESULTS_PER_PAGE }}
      USAJOBS_MAX_PAGES: ${{ vars.USAJOBS_MAX_PAGES }}
      ADZUNA_APP_ID: ${{ vars.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ vars.ADZUNA_APP_KEY }}
      ADZUNA_COUNTRY: ${{ vars.ADZUNA_COUNTRY }}
      ADZUNA_RESULTS_PER_PAGE: ${{ vars.ADZUNA_RESULTS_PER_PAGE }}
      ADZUNA_MAX_PAGES: ${{ vars.ADZUNA_MAX_PAGES }}
      JOOBLE_API_KEY: ${{ vars.JOOBLE_API_KEY }}
      JOOBLE_LOCATION: ${{ vars.JOOBLE_LOCATION }}
      JOOBLE_MAX_PAGES: ${{ vars.JOOBLE_MAX_PAGES }}
      GREENHOUSE_DISCOVERY_ENABLED: ${{ vars.GREENHOUSE_DISCOVERY_ENABLED }}
      GREENHOUSE_DISCOVERY_MAX_URLS: ${{ vars.GREENHOUSE_DISCOVERY_MAX_URLS }}
      GREENHOUSE_DISCOVERY_HTTP_TIMEOUT: ${{ vars.GREENHOUSE_DISCOVERY_HTTP_TIMEOUT }}
      GREENHOUSE_DISCOVERY_MAX_FETCH_BYTES: ${{ vars.GREENHOUSE_DISCOVERY_MAX_FETCH_BYTES }}
      GREENHOUSE_DISCOVERY_VALIDATE: ${{ vars.GREENHOUSE_DISCOVERY_VALIDATE }}
      GREENHOUSE_TOKENS_WORKSHEET: ${{ vars.GREENHOUSE_TOKENS_WORKSHEET }}
      MAX_PAGES_PER_KEYWORD: ${{ vars.MAX_PAGES_PER_KEYWORD }}
      MAX_POST_AGE_DAYS: ${{ vars.MAX_POST_AGE_DAYS }}
      PAGE_DELAY_RANGE_SECONDS: ${{ vars.PAGE_DELAY_RANGE_SECONDS }}
      KEYWORD_DELAY_RANGE_SECONDS: ${{ vars.KEYWORD_DELAY_RANGE_SECONDS }}
      HEARTBEAT_INTERVAL_SECONDS: ${{ vars.HEARTBEAT_INTERVAL_SECONDS }}
      TITLE_FILTER_EXPRESSION: ${{ vars.TITLE_FILTER_EXPRESSION }}
      RUN_SUMMARY_FILE: scraper_run_summary.json
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ vars.SMTP_PASSWORD }}
      SMTP_FROM_EMAIL: ${{ vars.SMTP_FROM_EMAIL }}
      SMTP_TO_EMAIL: ${{ vars.SMTP_TO_EMAIL }}
      SMTP_USE_STARTTLS: ${{ vars.SMTP_USE_STARTTLS }}
      PYTHONUNBUFFERED: "1"
    defaults:
      run:
        working-directory: linkedin-job-scraper
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium and OS dependencies
        run: python -m playwright install --with-deps chromium

      - name: Write Google service account credentials
        run: |
          cat <<'EOF' > service_account.json
          ${{ vars.GCP_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Run scraper
        run: python -u scraper.py

      - name: Discover Greenhouse tokens from collected job URLs
        if: always()
        continue-on-error: true
        run: python -u discover_greenhouse_tokens.py

      - name: Send run email notification
        if: always()
        env:
          RUN_STATUS: ${{ job.status }}
        run: python -u send_notification.py
